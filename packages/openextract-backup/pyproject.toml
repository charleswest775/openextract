[project]
name = "openextract-backup"
version = "0.1.0"
description = "iPhone device-to-disk backup agent"
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
dependencies = [
    "pymobiledevice3>=4.0.0",
    "pydantic>=2.0",
    "openextract-core",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/openextract"]
