[project]
name = "openextract-anonymize"
version = "0.1.0"
description = "PII redaction, pseudonymization, and diff for iPhone backup data"
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
dependencies = [
    "openextract-core",
    "pydantic>=2.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/openextract"]
