[project]
name = "openextract-analyzer"
version = "0.1.0"
description = "Analysis, AI synthesis, and report generation for iPhone backup data"
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
dependencies = [
    "openextract-core",
    "pydantic>=2.0",
]

[project.optional-dependencies]
reports = [
    "jinja2>=3.1",
    "weasyprint>=62.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/openextract"]
