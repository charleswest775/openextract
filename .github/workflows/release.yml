name: Release

# The release pipeline never pushes directly to `main`. Branch protection
# requires PRs, so instead we:
#   1. Build a `release/vX.Y.Z` branch carrying the version bump + website
#      URL updates, and push it (release/* is unprotected).
#   2. Tag that branch and build artifacts from the tag.
#   3. Open a PR from the release branch back to `main` so the bump and URL
#      updates can be reviewed and merged by a human.

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 0.4.0)'
        required: true
        type: string

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  preflight:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      pull-requests: write
    outputs:
      tag: v${{ inputs.version }}
      release_branch: release/v${{ inputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Validate version format
        run: |
          if ! echo "${{ inputs.version }}" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Invalid version format '${{ inputs.version }}'. Expected: X.Y.Z"
            exit 1
          fi

      - name: Check tag does not already exist
        run: |
          if git ls-remote --tags origin | grep -q "refs/tags/v${{ inputs.version }}$"; then
            echo "::error::Tag v${{ inputs.version }} already exists"
            exit 1
          fi

      # --- Build the release branch with all version-bump commits ---
      - name: Create release branch
        run: |
          BRANCH="release/v${{ inputs.version }}"
          # Reset any stale remote branch from a prior failed run so we start
          # from a clean state on main.
          git push origin --delete "$BRANCH" || true
          git checkout -b "$BRANCH"

      - name: Bump package.json version if needed
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          if [ "$CURRENT" != "${{ inputs.version }}" ]; then
            npm version "${{ inputs.version }}" --no-git-tag-version
            git add package.json package-lock.json
            git commit -m "chore: bump version to ${{ inputs.version }}"
            echo "Bumped version from $CURRENT to ${{ inputs.version }}"
          else
            echo "Version already matches ${{ inputs.version }}"
          fi

      # --- Quality gates (fail fast before touching remotes) ---
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: python/requirements*.txt

      - name: Install Node dependencies
        run: npm install

      - name: TypeScript check (renderer)
        run: npx tsc --noEmit

      - name: TypeScript check (electron)
        run: npx tsc --noEmit -p tsconfig.electron.json

      # python/requirements.txt installs ios-backup-core via `-e ../../ios-backup-core`.
      # The expected layout is openextract/ and ios-backup-core/ as siblings on disk,
      # so clone ios-backup-core one level above $GITHUB_WORKSPACE before pip runs.
      # TODO: remove this step once ios-backup-core ships to PyPI and requirements.txt
      # pins a versioned release instead of the editable path install.
      - name: Clone ios-backup-core (sibling for editable install)
        shell: bash
        run: |
          git clone --depth=1 \
            https://github.com/charleswest775/ios-backup-core.git \
            "$GITHUB_WORKSPACE/../ios-backup-core"

      # Run from python/ so pip resolves `-e ../../ios-backup-core` the same
      # way it does locally (README tells devs to `cd python` first).
      - name: Install Python dependencies
        working-directory: python
        run: pip install ruff pytest -r requirements.txt

      - name: Python lint
        run: ruff check python/

      - name: Python tests
        run: pytest python/tests/ -v

      - name: Build verification
        run: npm run build

      # --- Update website download URLs on the release branch ---
      # Touches two files:
      #   - website/static/index.html: nav version pill + installer filename refs.
      #     Nav copy may be `v0.4` (no patch) or `v0.4.0`; both should bump cleanly.
      #   - website/static/vercel.json: /download/{mac,windows,linux} redirects
      #     point at the GitHub release asset for this version. If we don't update
      #     vercel.json, the website keeps serving the previous version's binaries.
      - name: Update website version and download URLs
        run: |
          VERSION="${{ inputs.version }}"
          STAGED=0

          INDEX="website/static/index.html"
          if [ -f "$INDEX" ]; then
            # nav version pill — match vX.Y or vX.Y.Z so a 2-segment value still bumps.
            sed -i "s/v[0-9]\+\.[0-9]\+\(\.[0-9]\+\)\?/v${VERSION}/g" "$INDEX"
            sed -i "s/OpenExtract-Setup-[0-9]\+\.[0-9]\+\.[0-9]\+/OpenExtract-Setup-${VERSION}/g" "$INDEX"
            sed -i "s/OpenExtract-[0-9]\+\.[0-9]\+\.[0-9]\+-arm64/OpenExtract-${VERSION}-arm64/g" "$INDEX"
            sed -i "s/OpenExtract-[0-9]\+\.[0-9]\+\.[0-9]\+\.AppImage/OpenExtract-${VERSION}.AppImage/g" "$INDEX"
            if ! git diff --quiet "$INDEX"; then
              git add "$INDEX"
              STAGED=1
              echo "index.html updated to v${VERSION}"
            fi
          else
            echo "No $INDEX found, skipping"
          fi

          VERCEL="website/static/vercel.json"
          if [ -f "$VERCEL" ]; then
            # Redirects embed the version in both the path segment and the filename,
            # so a single regex over X.Y.Z occurrences swaps both at once.
            sed -i "s/[0-9]\+\.[0-9]\+\.[0-9]\+/${VERSION}/g" "$VERCEL"
            if ! git diff --quiet "$VERCEL"; then
              git add "$VERCEL"
              STAGED=1
              echo "vercel.json updated to v${VERSION}"
            fi
          else
            echo "No $VERCEL found, skipping"
          fi

          if [ "$STAGED" = "1" ]; then
            git commit -m "chore: update website download URLs to v${VERSION}"
          else
            echo "No website changes needed"
          fi

      # --- Push release branch (release/* is not protected) and tag ---
      - name: Push release branch
        run: git push --set-upstream origin "release/v${{ inputs.version }}"

      - name: Create and push tag
        run: |
          git tag "v${{ inputs.version }}"
          git push origin "v${{ inputs.version }}"

      - name: Create draft GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ inputs.version }}" \
            --draft \
            --generate-notes \
            --title "v${{ inputs.version }}"

  build-macos:
    needs: preflight
    runs-on: macos-latest
    timeout-minutes: 60
    permissions:
      contents: write
    steps:
      - name: Checkout tag
        uses: actions/checkout@v5
        with:
          ref: v${{ inputs.version }}

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Node dependencies
        run: npm install

      # See preflight job for rationale on sibling-clone + working-directory.
      - name: Clone ios-backup-core (sibling for editable install)
        shell: bash
        run: |
          git clone --depth=1 \
            https://github.com/charleswest775/ios-backup-core.git \
            "$GITHUB_WORKSPACE/../ios-backup-core"

      - name: Install Python dependencies and PyInstaller
        working-directory: python
        run: pip install pyinstaller -r requirements.txt

      - name: Build Python sidecar
        run: npm run python:bundle

      - name: Build Electron app
        run: npm run build

      - name: Package and publish
        run: npx electron-builder --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.MAC_CERTIFICATE_P12 }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

  build-windows:
    needs: preflight
    runs-on: windows-latest
    timeout-minutes: 60
    permissions:
      contents: write
    steps:
      - name: Checkout tag
        uses: actions/checkout@v5
        with:
          ref: v${{ inputs.version }}

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Node dependencies
        run: npm install

      # See preflight job for rationale on sibling-clone + working-directory.
      - name: Clone ios-backup-core (sibling for editable install)
        shell: bash
        run: |
          git clone --depth=1 \
            https://github.com/charleswest775/ios-backup-core.git \
            "$GITHUB_WORKSPACE/../ios-backup-core"

      - name: Install Python dependencies and PyInstaller
        working-directory: python
        run: pip install pyinstaller -r requirements.txt

      - name: Build Python sidecar
        run: npm run python:bundle

      - name: Build Electron app
        run: npm run build

      - name: Package and publish
        run: npx electron-builder --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}

  build-linux:
    needs: preflight
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
    steps:
      - name: Checkout tag
        uses: actions/checkout@v5
        with:
          ref: v${{ inputs.version }}

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-tools

      - name: Install Node dependencies
        run: npm install

      # See preflight job for rationale on sibling-clone + working-directory.
      - name: Clone ios-backup-core (sibling for editable install)
        shell: bash
        run: |
          git clone --depth=1 \
            https://github.com/charleswest775/ios-backup-core.git \
            "$GITHUB_WORKSPACE/../ios-backup-core"

      - name: Install Python dependencies and PyInstaller
        working-directory: python
        run: pip install pyinstaller -r requirements.txt

      - name: Build Python sidecar
        run: npm run python:bundle

      - name: Build Electron app
        run: npm run build

      - name: Package and publish
        run: npx electron-builder --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  finalize:
    needs: [preflight, build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout release branch
        uses: actions/checkout@v5
        with:
          ref: release/v${{ inputs.version }}
          token: ${{ secrets.GITHUB_TOKEN }}
          # Full history + all branches so `origin/main..HEAD` resolves in the
          # sync-PR step below. Default shallow checkout only fetches the ref
          # we asked for, so origin/main is missing from the local repo.
          fetch-depth: 0

      - name: Fetch main for comparison
        run: git fetch --no-tags origin main:refs/remotes/origin/main

      - name: Publish release (remove draft)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit "v${{ inputs.version }}" --draft=false

      # Open a PR so main picks up the version bump + website URL updates.
      # This is the only path for those changes to reach main under the
      # required-PR-review branch protection policy.
      - name: Open sync PR to main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Skip if the branch has no commits ahead of main (unchanged release).
          AHEAD=$(git rev-list --count origin/main..HEAD)
          if [ "$AHEAD" = "0" ]; then
            echo "No commits ahead of main — nothing to sync."
            exit 0
          fi
          # Reuse existing PR if one is already open from this branch.
          EXISTING=$(gh pr list --head "release/v${{ inputs.version }}" --state open --json number --jq '.[0].number')
          if [ -n "$EXISTING" ]; then
            echo "Sync PR already open: #$EXISTING"
            exit 0
          fi
          gh pr create \
            --base main \
            --head "release/v${{ inputs.version }}" \
            --title "chore: release v${{ inputs.version }}" \
            --body "Auto-opened by the Release workflow after v${{ inputs.version }} artifacts were published. Merging this PR keeps \`main\` in sync: version bump in \`package.json\` and updated download URLs in \`website/static/index.html\`."

      - name: Summary
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "## Release v${{ inputs.version }} published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Artifacts" >> $GITHUB_STEP_SUMMARY
          gh release view "v${{ inputs.version }}" --json assets --jq '.assets[] | "- \(.name) (\(.size / 1048576 | floor)MB)"' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "[View release](https://github.com/${{ github.repository }}/releases/tag/v${{ inputs.version }})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Next step" >> $GITHUB_STEP_SUMMARY
          echo "Merge the [sync PR](https://github.com/${{ github.repository }}/pulls?q=is%3Apr+is%3Aopen+head%3Arelease%2Fv${{ inputs.version }}) to update \`main\`." >> $GITHUB_STEP_SUMMARY
