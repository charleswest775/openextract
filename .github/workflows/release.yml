name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 0.4.0)'
        required: true
        type: string

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  preflight:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    outputs:
      tag: v${{ inputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Validate version format
        run: |
          if ! echo "${{ inputs.version }}" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Invalid version format '${{ inputs.version }}'. Expected: X.Y.Z"
            exit 1
          fi

      - name: Check tag does not already exist
        run: |
          if git ls-remote --tags origin | grep -q "refs/tags/v${{ inputs.version }}$"; then
            echo "::error::Tag v${{ inputs.version }} already exists"
            exit 1
          fi

      - name: Bump package.json version if needed
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          if [ "$CURRENT" != "${{ inputs.version }}" ]; then
            npm version "${{ inputs.version }}" --no-git-tag-version
            git add package.json package-lock.json
            git commit -m "chore: bump version to ${{ inputs.version }}"
            git push
            echo "Bumped version from $CURRENT to ${{ inputs.version }}"
          else
            echo "Version already matches ${{ inputs.version }}"
          fi

      # --- Quality gates ---
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: python/requirements*.txt

      - name: Install Node dependencies
        run: npm install

      - name: TypeScript check (renderer)
        run: npx tsc --noEmit

      - name: TypeScript check (electron)
        run: npx tsc --noEmit -p tsconfig.electron.json

      - name: Install Python dependencies
        run: pip install ruff pytest -r python/requirements.txt

      - name: Python lint
        run: ruff check python/

      - name: Python tests
        run: pytest python/tests/ -v

      - name: Build verification
        run: npm run build

      # --- Update website download URLs ---
      - name: Update website version and download URLs
        run: |
          VERSION="${{ inputs.version }}"
          FILE="website/static/index.html"
          if [ -f "$FILE" ]; then
            # Update version badge (e.g. "v0.3.4" -> "v0.4.0")
            sed -i "s/v[0-9]\+\.[0-9]\+\.[0-9]\+/v${VERSION}/g" "$FILE"
            # Update download URLs with bare version (e.g. "Setup-0.3.4.exe" -> "Setup-0.4.0.exe")
            sed -i "s/OpenExtract-Setup-[0-9]\+\.[0-9]\+\.[0-9]\+/OpenExtract-Setup-${VERSION}/g" "$FILE"
            sed -i "s/OpenExtract-[0-9]\+\.[0-9]\+\.[0-9]\+-arm64/OpenExtract-${VERSION}-arm64/g" "$FILE"
            sed -i "s/OpenExtract-[0-9]\+\.[0-9]\+\.[0-9]\+\.AppImage/OpenExtract-${VERSION}.AppImage/g" "$FILE"
            if git diff --quiet "$FILE"; then
              echo "No website changes needed"
            else
              git add "$FILE"
              git commit -m "chore: update website download URLs to v${VERSION} [skip ci]"
              git push
              echo "Website updated to v${VERSION}"
            fi
          else
            echo "No website/static/index.html found, skipping"
          fi

      # --- Tag and draft release ---
      - name: Create and push tag
        run: |
          git tag "v${{ inputs.version }}"
          git push origin "v${{ inputs.version }}"

      - name: Create draft GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ inputs.version }}" \
            --draft \
            --generate-notes \
            --title "v${{ inputs.version }}"

  build-macos:
    needs: preflight
    runs-on: macos-latest
    timeout-minutes: 60
    permissions:
      contents: write
    steps:
      - name: Checkout tag
        uses: actions/checkout@v5
        with:
          ref: v${{ inputs.version }}

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Node dependencies
        run: npm install

      - name: Install Python dependencies and PyInstaller
        run: pip install pyinstaller -r python/requirements.txt

      - name: Build Python sidecar
        run: npm run python:bundle

      - name: Build Electron app
        run: npm run build

      - name: Package and publish
        run: npx electron-builder --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.MAC_CERTIFICATE_P12 }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

  build-windows:
    needs: preflight
    runs-on: windows-latest
    timeout-minutes: 60
    permissions:
      contents: write
    steps:
      - name: Checkout tag
        uses: actions/checkout@v5
        with:
          ref: v${{ inputs.version }}

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Node dependencies
        run: npm install

      - name: Install Python dependencies and PyInstaller
        run: pip install pyinstaller -r python/requirements.txt

      - name: Build Python sidecar
        run: npm run python:bundle

      - name: Build Electron app
        run: npm run build

      - name: Package and publish
        run: npx electron-builder --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}

  build-linux:
    needs: preflight
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
    steps:
      - name: Checkout tag
        uses: actions/checkout@v5
        with:
          ref: v${{ inputs.version }}

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-tools

      - name: Install Node dependencies
        run: npm install

      - name: Install Python dependencies and PyInstaller
        run: pip install pyinstaller -r python/requirements.txt

      - name: Build Python sidecar
        run: npm run python:bundle

      - name: Build Electron app
        run: npm run build

      - name: Package and publish
        run: npx electron-builder --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  finalize:
    needs: [preflight, build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Publish release (remove draft)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit "v${{ inputs.version }}" --draft=false

      - name: Summary
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "## Release v${{ inputs.version }} published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Artifacts" >> $GITHUB_STEP_SUMMARY
          gh release view "v${{ inputs.version }}" --json assets --jq '.assets[] | "- \(.name) (\(.size / 1048576 | floor)MB)"' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "[View release](https://github.com/${{ github.repository }}/releases/tag/v${{ inputs.version }})" >> $GITHUB_STEP_SUMMARY
