[project]
name = "openextract-api"
version = "0.1.0"
description = "REST API server for openextract — exposes all components over HTTP with SSE streaming"
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
dependencies = [
    "openextract-core",
    "openextract-analyzer",
    "openextract-anonymize",
    "fastapi>=0.111",
    "uvicorn[standard]>=0.30",
    "python-multipart>=0.0.9",
    "pydantic>=2.0",
]

[project.optional-dependencies]
backup = ["openextract-backup"]

[project.scripts]
openextract = "openextract.api.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/openextract"]
