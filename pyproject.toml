[tool.uv.workspace]
members = [
    "packages/openextract-core",
    "packages/openextract-backup",
    "packages/openextract-analyzer",
    "packages/openextract-anonymize",
    "packages/openextract-api",
]

[tool.uv]
dev-dependencies = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.23.0",
    "httpx>=0.27.0",
    "ruff>=0.4.0",
]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "UP"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["packages"]
