[project]
name = "openextract-core"
version = "0.1.0"
description = "iPhone backup reader and data extraction engine"
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
dependencies = [
    "iphone-backup-decrypt>=0.5.0",
    "Pillow>=10.0",
    "pillow-heif>=0.13.0",
    "pydantic>=2.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "ruff>=0.4.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/openextract"]
